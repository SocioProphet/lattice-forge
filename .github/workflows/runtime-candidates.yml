name: Runtime Candidates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate runtime candidate records
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate runtime candidates
        run: make runtime-candidates-validate
