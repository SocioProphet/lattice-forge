name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate RuntimeAsset contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate examples
        run: python src/lattice_forge/validate_runtime_asset.py examples/*.json
      - name: Validate runtime descriptors
        run: python src/lattice_forge/validate_runtime_asset.py runtimes/*/runtime-asset.json
      - name: Validate runtime evidence sidecars
        run: python src/lattice_forge/validate_runtime_evidence.py runtimes/*
      - name: Generate runtime evidence summary
        run: python src/lattice_forge/evidence_summary.py runtimes/prophet-python-ml
      - name: Run tests
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest
